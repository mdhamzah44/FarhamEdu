<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
/* =========================
   📦 GLOBAL VARIABLES
========================= */
const classId = "{{ cls.class_id }}";

const chatBox = document.getElementById("chatMessages");
const input = document.querySelector(".chat-input input");
const sendBtn = document.querySelector(".chat-input button");
const video = document.getElementById("studentVideo");

/* =========================
   ❌ VALIDATION
========================= */
if (!classId || classId === "undefined") {
    alert("Invalid Class ID");
    window.location.href = "/";
}

/* =========================
   🔌 SOCKET CONNECTION
========================= */
const socket = io("https://FarhamEdu-dbqo.onrender.com", {
    transports: ["websocket"]
});

/* JOIN ROOM */
socket.emit("join-room", { class_id: classId });

/* =========================
   🎥 WEBRTC SETUP
========================= */
let pc = null;
let iceQueue = [];
let isRemoteSet = false;

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject"
        }
    ]
};

/* 🔊 AUTOPLAY FIX */
document.body.addEventListener("click", () => {
    if (video && video.srcObject) {
        video.muted = false;
        video.play().catch(() => {});
    }
});

/* RECEIVE OFFER */
socket.on("offer", async (data) => {
    console.log("📩 Offer received");

    if (pc) pc.close();

    pc = new RTCPeerConnection(config);
    iceQueue = [];
    isRemoteSet = false;

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => pc.addTrack(track, stream));
    } catch (e) {
        console.warn("Mic permission denied");
    }

    pc.ontrack = (e) => {
        console.log("🎥 Stream received");
        if (video) video.srcObject = e.streams[0];
    };

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit("ice-candidate", {
                candidate: e.candidate,
                to: data.from,
                class_id: classId
            });
        }
    };

    try {
        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
        isRemoteSet = true;

        for (const candidate of iceQueue) {
            await pc.addIceCandidate(candidate);
        }
        iceQueue = [];

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        socket.emit("answer", {
            answer: answer,
            to: data.from,
            class_id: classId
        });

    } catch (err) {
        console.error("WebRTC error:", err);
    }
});

/* RECEIVE ICE */
socket.on("ice-candidate", async (data) => {
    if (!pc || !data.candidate) return;

    const candidate = new RTCIceCandidate(data.candidate);

    if (isRemoteSet) {
        try {
            await pc.addIceCandidate(candidate);
        } catch (e) {
            console.error("ICE error:", e);
        }
    } else {
        iceQueue.push(candidate);
    }
});

/* =========================
   🎥 VIDEO CONTROLS
========================= */
const isInvalid = {{ invalid | tojson }};

if (!isInvalid) {

    const videoPlayer = document.getElementById("studentVideo");
    const controls = document.getElementById("controlsBar");
    const timerBox = document.getElementById("startTimer");

    function renderControls() {
    controls.innerHTML = `
        <button class="ctrl-btn" onclick="togglePlay()">▶️</button>
        <button class="ctrl-btn" onclick="volumeDown()">🔉</button>
        <button class="ctrl-btn" onclick="volumeUp()">🔊</button>
        <button class="ctrl-btn" onclick="toggleFullscreen()">⛶</button> <!-- 🔥 NEW -->
    `;
}

    window.togglePlay = function () {
        if (!videoPlayer) return;
        videoPlayer.paused ? videoPlayer.play() : videoPlayer.pause();
    };

    window.volumeUp = function () {
        if (!videoPlayer) return;
        videoPlayer.volume = Math.min(1, videoPlayer.volume + 0.1);
    };

    window.volumeDown = function () {
        if (!videoPlayer) return;
        videoPlayer.volume = Math.max(0, videoPlayer.volume - 0.1);
    };

    function startClassTimer(classTimeStr) {
        const [h, m] = classTimeStr.split(":").map(Number);

        const classTime = new Date();
        classTime.setHours(h, m, 0, 0);

        function update() {
            const diff = classTime - new Date();

            if (diff <= 0) {
                timerBox.style.display = "none";
                return;
            }

            const mins = Math.floor(diff / 60000);
            const secs = Math.floor((diff % 60000) / 1000);

            if (mins <= 20) {
                timerBox.style.display = "block";
                timerBox.innerText =
                    `Class starts in ${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        update();
        setInterval(update, 1000);
    }

    renderControls();
    startClassTimer("{{ cls.time }}");
}

function toggleFullscreen() {
    const elem = document.getElementById("appContainer");

    if (!document.fullscreenElement) {
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { // Safari
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { // IE
            elem.msRequestFullscreen();
        }
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        }
    }
}

/* =========================
   💬 CHAT SYSTEM
========================= */
const displayedJoins = new Set();

async function loadComments() {
    try {
        const res = await fetch(`/get-comments/${classId}`);
        const data = await res.json();

        chatBox.innerHTML = "";

        data.forEach(c => {
            const div = document.createElement("div");

            if (c.type === "join") {
                if (!displayedJoins.has(c.id)) {
                    displayedJoins.add(c.id);

                    div.classList.add("message");
                    div.style.background = "#334155";
                    div.style.textAlign = "center";

                    div.innerHTML = `
                        <div class="meta">${c.time}</div>
                        <div class="text">👋 ${c.text}</div>
                    `;
                    chatBox.appendChild(div);
                }
                return;
            }

            div.classList.add("message");
            if (c.role === "Teacher") div.classList.add("teacher");

            div.innerHTML = `
                <div class="meta">${c.name} • ${c.time}</div>
                <div class="text">${c.text}</div>
            `;

            chatBox.appendChild(div);
        });

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (err) {
        console.error("Chat load error:", err);
    }
}

/* SEND MESSAGE */
async function sendComment() {
    const text = input.value.trim();
    if (!text) return;

    try {
        await fetch("/add-comment", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                class_id: classId,
                text: text
            })
        });

        input.value = "";
        loadComments();

    } catch (err) {
        console.error("Send error:", err);
    }
}

/* EVENTS */
sendBtn.onclick = sendComment;

input.addEventListener("keypress", e => {
    if (e.key === "Enter") sendComment();
});

/* AUTO REFRESH */
setInterval(loadComments, 2000);

window.onload = () => {
    loadComments();
};

/* MARK JOIN */
async function markJoin() {
    try {
        await fetch("/join-class", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ class_id: classId })
        });
    } catch (err) {
        console.error("Join error:", err);
    }
}
markJoin();



/* =========================
   ♻️ LOAD OLD CANVAS (IMPORTANT)
========================= */
socket.on("load-canvas", (data) => {

    // Clear first
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.beginPath();

    data.forEach(item => {

        if (item.type === "start") {
            ctx.beginPath();
            ctx.moveTo(item.x, item.y);
        }

        else if (item.type === "draw") {
            ctx.lineTo(item.x, item.y);
            ctx.stroke();
        }

        else if (item.type === "end") {
            ctx.beginPath();
        }

    });

});

/* =========================
   🎨 CANVAS
========================= */
const canvas = document.getElementById("myCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    const parent = canvas.parentElement;

    canvas.width = parent.clientWidth;
    canvas.height = parent.clientHeight;
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function draw(x, y) {
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.strokeStyle = "black";
    ctx.lineTo(x, y);
    ctx.stroke();
}

socket.on("draw-start", data => {
    ctx.beginPath();
    ctx.moveTo(data.x, data.y);
});

socket.on("draw", data => {
    draw(data.x, data.y);
});

socket.on("draw-end", () => {
    ctx.beginPath();
});

socket.on("clear-canvas", () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
});

/* =========================
   🔙 BACK BUTTON FIX
========================= */
history.pushState(null, null, location.href);
window.onpopstate = () => location.href = "/";

function goBack() {
    window.location.href = "/LPstudenthome";
}

function checkOrientation() {
    const rotateScreen = document.getElementById("rotateScreen");
    const app = document.getElementById("appContainer");

    if (window.innerHeight > window.innerWidth) {
        // Portrait → block UI
        rotateScreen.style.display = "flex";
        if (app) app.style.display = "none";
    } else {
        // Landscape → show app
        rotateScreen.style.display = "none";
        if (app) app.style.display = "flex";
    }
}

/* Run on load + resize */
window.addEventListener("load", checkOrientation);
window.addEventListener("resize", checkOrientation);
window.addEventListener("orientationchange", checkOrientation);
</script>
